site_name: CTGCatalog
site_url: https://cloufield.github.io/CTGCatalog/
site_description: >-
  Curated index of complex trait genetics resources—biobanks, GWAS summary statistics,
  software tools, references, single-cell methods, major projects, and AI-related tooling.
site_author: HE Yunye
repo_name: 'GitHub'
repo_url: https://github.com/Cloufield/CTGCatalog/
edit_uri: ""
copyright: "CTGCatalog is licensed under the MIT license"

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Cloufield/CTGCatalog
      name: CTGCatalog on GitHub

theme:
  name: material
  custom_dir: docs/overrides
  features:
      - navigation.tabs
      - navigation.top
      - navigation.path
      - navigation.prune
      - toc.follow
      - search.highlight
      - search.suggest
      - search.share
  font: false
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  logo:
      assets/logo.png
  favicon:
      assets/logo.png

extra_css:
  - stylesheets/extra.min.css

markdown_extensions:
  - md_in_html
  - toc:
      toc_depth: 3
  - admonition
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/tablesort@5.3.0/dist/tablesort.min.js
  - javascripts/tablesort.js

plugins:
  - meta
  - tags
  - search
  - mkdocs-jupyter

not_in_nav: |
  Trending/index.md
  Trending/Trending_PubMed_GWAS.md

